# Redis is already running as a systemd service on port 6379 — this file only starts Scylla
# To run Redis in Docker instead: stop system Redis first (`sudo systemctl stop redis-server`)
services:
  scylla:
    image: scylladb/scylla:5.4
    container_name: darkages-scylla
    ports:
      - "9042:9042"
    volumes:
      - scylla_data:/var/lib/scylla
    command: --smp 1 --memory 1G --developer-mode 1 --overprovisioned 1
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    networks:
      - darkages-network

volumes:
  redis_data:
  scylla_data:

networks:
  darkages-network:
    driver: bridge
